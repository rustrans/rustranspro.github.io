<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Dmitry Morozov</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
        }

        #container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* Шапка */
        #header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #2c3e50;
            color: white;
            gap: 15px;
        }

        #header-left h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        #header2 {
            margin-top: 5px;
        }

        .status {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #header-right h4 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* Основная область чата */
        #main {
            flex: 1;                    /* Самое важное — занимает всё свободное пространство */
            min-height: 0;              /* Необходимо при flex */
            padding: 15px;
            background: #f9f9f9;
            box-sizing: border-box;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            min-height: 600px;          /* Минимальная высота чата */
            border: 1px solid #ddd;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            #header {
                flex-direction: column;
                text-align: center;
            }
            .iframe-wrapper {
                min-height: 500px;
            }
        }
    </style>
</head>
<body>
    <div id="container">

        <!-- Шапка -->
        <div id="header">
            <div id="header-left">
                <div id="header1">
                    <h1>Übersetzungen, Digitalisierung und Layout</h1>
                </div>
                <div id="header2">
                    <h2 class="status online">
                        Mein Online-Status:
                        <span class="dot"></span>
                        <span class="status-text">Online</span>
                    </h2>
                </div>
            </div>
            
            <div id="header-right">
                <h4>Dmitry Morozov</h4>
            </div>
        </div>

        <!-- Блок чата -->
        <div id="main">
            <div class="iframe-wrapper">
                <iframe src="https://thelounge.hybridirc.com/?channels=morozov-online" 
                        allowfullscreen 
                        title="The Lounge Chat"></iframe>
            </div>
        </div>

    </div>
</body>
</html>
