<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support-Chat</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    #messages { height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; }
    .message { margin: 8px 0; padding: 8px; border-radius: 8px; }
    .visitor { background: #e3f2fd; text-align: right; }
    .admin { background: #f0f0f0; text-align: left; }
  </style>
</head>
<body>
  <h1>Support-Chat</h1>
  
  <div id="messages"></div>
  
  <form id="form">
    <textarea id="message" rows="3" style="width:100%" placeholder="Schreiben Sie Ihre Nachricht..."></textarea><br><br>
    <button type="submit">Senden</button>
  </form>

  <script>
    const firebaseConfig = { /* ваш config остаётся тот же */ 
      apiKey: "AIzaSyD9Tiws2tf1rYJuJ83hMJ6q1owJ2iHbMR8",
      authDomain: "my-simple-chat-b59b9.firebaseapp.com",
      databaseURL: "https://my-simple-chat-b59b9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-simple-chat-b59b9",
      storageBucket: "my-simple-chat-b59b9.firebasestorage.app",
      messagingSenderId: "106669535181",
      appId: "1:106669535181:web:678e89c79b063bb03c5e84"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref('messages');

    const messagesDiv = document.getElementById('messages');
    const form = document.getElementById('form');

    messagesRef.orderByChild('timestamp').on('child_added', (snapshot) => {
      const msg = snapshot.val();
      const div = document.createElement('div');
      div.className = `message ${msg.sender}`;
      div.innerHTML = `<strong>${msg.sender === 'admin' ? 'Support' : 'Sie'}:</strong><br>${msg.text}<br>
                       <small>${new Date(msg.timestamp).toLocaleTimeString('de-DE')}</small>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = document.getElementById('message').value.trim();
      if (!text) return;

      messagesRef.push({
        sender: 'visitor',
        text: text,
        timestamp: Date.now()
      });

      document.getElementById('message').value = '';
    });
  </script>
</body>
</html>
