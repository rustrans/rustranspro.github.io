<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Support-Chat</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      padding: 10px; 
      max-width: 100%; 
      margin: 0; 
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0066ff;
      color: white;
      padding: 12px;
      text-align: center;
      border-radius: 0 0 12px 12px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    #messages { 
      flex: 1;
      overflow-y: auto; 
      padding: 10px; 
      background: white;
      border-radius: 12px;
      margin-bottom: 10px;
      scroll-behavior: smooth;
    }
    .message { 
      margin: 8px 0; 
      padding: 10px 14px; 
      border-radius: 18px; 
      max-width: 85%;
      word-wrap: break-word;
      position: relative;
    }
    .visitor { 
      background: #0066ff; 
      color: white; 
      margin-left: auto; 
      border-bottom-right-radius: 4px;
    }
    .admin { 
      background: #e8e8e8; 
      color: #333;
      margin-right: auto; 
      border-bottom-left-radius: 4px;
    }
    .message strong { display: block; font-size: 0.85em; margin-bottom: 4px; opacity: 0.9; }
    .message small { 
      display: block; 
      font-size: 0.75em; 
      margin-top: 6px; 
      opacity: 0.8; 
      text-align: right;
    }
    .input-area {
      background: white;
      padding: 10px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    textarea { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid #ddd; 
      border-radius: 24px;
      font-size: 16px;
      resize: none;
      outline: none;
      transition: border 0.2s;
    }
    textarea:focus { border-color: #0066ff; }
    button { 
      margin-top: 8px;
      width: 100%; 
      padding: 14px; 
      font-size: 16px; 
      font-weight: 600;
      background: #0066ff; 
      color: white; 
      border: none; 
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: #0052cc; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { 
      text-align: center; 
      font-size: 0.8em; 
      color: #666; 
      padding: 5px;
      flex-shrink: 0;
    }
    .status.connected { color: #2e7d32; }
    .status.error { color: #c62828; }
    @media (max-width: 480px) {
      body { padding: 5px; }
      .message { max-width: 90%; padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 style="margin:0;font-size:1.2em">💬 Support-Chat</h1>
  </header>
  
  <div id="status" class="status">Verbinde...</div>
  <div id="messages"></div>
  
  <div class="input-area">
    <form id="form">
      <textarea id="message" rows="2" placeholder="Nachricht schreiben..." maxlength="1000"></textarea>
      <button type="submit" id="sendBtn">Senden</button>
    </form>
  </div>

  <script>
    // === Firebase Config ===
    const firebaseConfig = {
      apiKey: "AIzaSyD9Tiws2tf1rYJuJ83hMJ6q1owJ2iHbMR8",
      authDomain: "my-simple-chat-b59b9.firebaseapp.com",
      databaseURL: "https://my-simple-chat-b59b9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-simple-chat-b59b9",
      storageBucket: "my-simple-chat-b59b9.firebasestorage.app",
      messagingSenderId: "106669535181",
      appId: "1:106669535181:web:678e89c79b063bb03c5e84"
    };

    try {
      firebase.initializeApp(firebaseConfig);
    } catch(e) {
      console.error('Firebase init error:', e);
    }
    
    const db = firebase.database();
    const messagesRef = db.ref('messages');
    const statusEl = document.getElementById('status');

    // DOM элементы
    const messagesDiv = document.getElementById('messages');
    const form = document.getElementById('form');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('sendBtn');

    // Проверка подключения
    db.ref('.info/connected').on('value', (snapshot) => {
      const connected = snapshot.val();
      statusEl.textContent = connected ? '● Verbunden' : '○ Getrennt – versuche zu verbinden...';
      statusEl.className = `status ${connected ? 'connected' : 'error'}`;
      sendBtn.disabled = !connected;
    });

    // Отслеживание позиции скролла
    let isAtBottom = true;
    messagesDiv.addEventListener('scroll', () => {
      const threshold = 50;
      isAtBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < threshold;
    });

    function scrollToBottom() {
      if (isAtBottom) {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    }

    // Безопасное создание сообщения
    function createMessageElement(msg) {
      const div = document.createElement('div');
      div.className = `message ${msg.sender}`;
      
      const name = document.createElement('strong');
      name.textContent = msg.sender === 'admin' ? 'Support' : 'Sie';
      
      const text = document.createElement('div');
      text.textContent = msg.text; // ✅ Защита от XSS
      text.style.whiteSpace = 'pre-wrap';
      
      const time = document.createElement('small');
      time.textContent = new Date(msg.timestamp).toLocaleTimeString('de-DE');
      
      div.appendChild(name);
      div.appendChild(text);
      div.appendChild(time);
      return div;
    }

    // Подписка на сообщения
    messagesRef.orderByChild('timestamp').limitToLast(100).on('child_added', (snapshot) => {
      try {
        const msg = snapshot.val();
        if (!msg?.text) return;
        
        messagesDiv.appendChild(createMessageElement(msg));
        scrollToBottom();
      } catch(e) {
        console.error('Error displaying message:', e);
      }
    }, (error) => {
      console.error('Firebase read error:', error);
      statusEl.textContent = 'Fehler beim Laden der Nachrichten';
      statusEl.className = 'status error';
    });

    // Отправка сообщения
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      const originalText = sendBtn.textContent;
      sendBtn.textContent = 'Sende...';

      try {
        await messagesRef.push({
          sender: 'visitor',
          text: text,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        messageInput.value = '';
        isAtBottom = true;
        scrollToBottom();
      } catch(error) {
        console.error('Send error:', error);
        alert('Nachricht konnte nicht gesendet werden. Bitte prüfen Sie Ihre Verbindung.');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = originalText;
        messageInput.focus();
      }
    });

    // Auto-resize textarea
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Инициализация
    window.addEventListener('load', () => {
      messageInput.focus();
      isAtBottom = true;
      scrollToBottom();
    });
  </script>
</body>
</html>
