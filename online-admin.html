<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Admin</title>
</head>
<body>

<div class="container">

  <h2>Статус</h2>

  <div id="current" class="card">Загрузка...</div>

  <div class="buttons">
    <button id="btn-green" class="green" onclick="setStatus('green', textGreen)">🟢 Online</button>
    <button id="btn-yellow" class="yellow" onclick="setStatus('yellow', textYellow)">🟡 Teilweise</button>
    <button id="btn-red" class="red" onclick="setStatus('red', textRed)">🔴 Offline</button>
  </div>

  <div class="custom">
    <textarea id="customText" placeholder="Свой текст статуса..."></textarea>
    <button class="custom-btn" onclick="setCustom()">Отправить</button>
  </div>

</div>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  font-size: 40px; /* ↑ базовый размер */
}

.container {
  max-width: 95%; /* почти на всю ширину экрана */
  margin: auto;
  padding: 25px;
}

h2 {
  text-align: center;
  font-size: 40px; /* крупнее заголовок */
}

.card {
  background: white;
  padding: 25px; /* ↑ было 15 */
  border-radius: 12px;
  margin-bottom: 25px;
  font-size: 40px; /* ↑ текст */
  line-height: 1.4;
}

.buttons button {
  width: 100%;
  padding: 25px; /* ↑ было 15 (примерно +100% по высоте) */
  margin-bottom: 15px;
  font-size: 40px; /* ↑ крупный текст */
  border: none;
  border-radius: 12px;
  color: white;
}

.green { background: #28a745; }
.yellow { background: #ffc107; color: black; }
.red { background: #dc3545; }

.active {
  outline: 4px solid black; /* заметнее */
}

textarea {
  width: 100%;
  height: 120px; /* ↑ было 80 */
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 40px;
}

.custom-btn {
  width: 100%;
  margin-top: 15px;
  padding: 20px;
  font-size: 40px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
}
</style>

<script>
const API = "https://rustranspro-github-io.vercel.app/api";

const textGreen = "Ich bin gerade am Computer und antworte auf Ihre E-Mail in der Regel innerhalb einer Stunde.";
const textYellow = "Derzeit bin ich nicht durchgehend erreichbar. Meine Antwort auf Ihre E-Mail kommt innerhalb von drei Stunden.";
const textRed = "Im Moment habe ich keinen Zugriff auf meine E-Mails. Es kann mehrere Stunden dauern, bis ich auf Ihre E-Mail antworte.";

async function setStatus(mode, text) {
  await fetch(API + "/set-status?t=" + Date.now(), {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      mode: mode,
      text: text
    })
  });

  loadCurrentStatus();
}

function setCustom() {
  const text = document.getElementById("customText").value;
  setStatus("custom", text);
}

function highlight(mode) {
  document.getElementById('btn-green').classList.remove('active');
  document.getElementById('btn-yellow').classList.remove('active');
  document.getElementById('btn-red').classList.remove('active');

  if (mode === 'green') document.getElementById('btn-green').classList.add('active');
  if (mode === 'yellow') document.getElementById('btn-yellow').classList.add('active');
  if (mode === 'red') document.getElementById('btn-red').classList.add('active');
}

async function loadCurrentStatus() {
  const res = await fetch(API + "/status?t=" + Date.now());
  const data = await res.json();

  document.getElementById("current").innerHTML =
    "<b>" + data.text + "</b>";

  highlight(data.mode);
}

loadCurrentStatus();
</script>
<!-- ==================== ЧАТ ДЛЯ АДМИНА ==================== -->
<div style="max-width: 760px; margin: 50px auto 40px auto; padding: 0 20px;">
  
  <h3 style="text-align:center; margin-bottom: 25px; color:#333;">
    💬 Чат с посетителями (общий)
  </h3>

  <div id="chat-box-admin" style="
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  ">

    <div id="messages" style="
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 10px;
    "></div>

    <textarea id="msg" 
      placeholder="Напишите сообщение посетителю..." 
      style="width:100%; min-height: 140px; padding:14px; font-size:16px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box; resize:vertical;"></textarea>

    <div style="text-align:center; margin-top: 18px;">
      <button onclick="sendMessage()" 
        style="padding:14px 36px; font-size:17px; border:none; border-radius:10px; cursor:pointer; background:#28a745; color:white;">
        Отправить
      </button>
    </div>
  </div>

</div>
<script>
  const CHAT_API = "https://rustranspro-github-io.vercel.app/api/chat";

  async function loadMessages() {
    try {
      const res = await fetch(CHAT_API + "?t=" + Date.now());
      const messages = await res.json();
      const box = document.getElementById("messages");

      box.innerHTML = messages.map(m => `
        <div style="
          margin-bottom:15px;
          padding:14px;
          border-radius:12px;
          background:${m.author === 'admin' ? '#e6f7e6' : '#f5f5f5'};
          line-height:1.5;
          font-size:15px;
          word-break:break-word;
        ">
          <div style="
            font-weight:bold;
            margin-bottom:6px;
            color:${m.author === 'admin' ? '#28a745' : '#444'};
          ">
            ${m.author === 'admin' ? 'Вы (Admin)' : 'Посетитель'}
          </div>
          <div>${m.text}</div>
        </div>
      `).join("");

      box.scrollTop = box.scrollHeight;
    } catch (e) {
      console.log(e);
    }
  }

  async function sendMessage() {
    const textarea = document.getElementById("msg");
    const text = textarea.value.trim();
    if (!text) return;

    await fetch(CHAT_API + "?t=" + Date.now(), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        author: "admin",     // ← важно! Отправляем как админ
        text
      })
    });

    textarea.value = "";
    loadMessages();
  }

  // Инициализация
  window.onload = function() {
    loadMessages();
    
    // Автообновление каждые 15 секунд
    setInterval(() => {
      if (document.visibilityState === "visible") {
        loadMessages();
      }
    }, 15000);
  };

  // Делаем функцию доступной глобально
  window.sendMessage = sendMessage;
</script>
</body>
</html>
