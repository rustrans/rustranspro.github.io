<h2>Управление статусом</h2>

<div id="current">Загрузка...</div>

<br>

<button onclick="setStatus('green', 'Ich bin gerade am Computer. Die voraussichtliche Bearbeitungszeit für Ihre Anfrage beträgt etwa 15 Minuten.')">
Зелёный
</button>

<button onclick="setStatus('yellow', 'Derzeit bin ich nicht durchgehend erreichbar. Die voraussichtliche Bearbeitungszeit für Ihre Anfrage beträgt etwa eine Stunde.')">
Жёлтый
</button>

<button onclick="setStatus('red', 'Im Moment habe ich keinen Zugriff auf meine E-Mails. Sie erhalten meine Antwort auf jeden Fall bis morgen früh.')">
Красный
</button>

<br><br>

<input id="customText" placeholder="Свой текст">
<button onclick="setCustom()">Отправить</button>

<script>
const API = "https://rustranspro-github-io.vercel.app/api";

async function setStatus(mode, text) {
  await fetch(API + "/set-status", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      mode: mode,
      text: text
    })
  });

  loadCurrentStatus();
}

function setCustom() {
  const text = document.getElementById("customText").value;
  setStatus("custom", text);
}

async function loadCurrentStatus() {
  const res = await fetch(API + "/status");
  const data = await res.json();

  document.getElementById("current").innerText =
    "Текущий статус: " + data.mode;
}

loadCurrentStatus();
</script>
