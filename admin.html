<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Support Chat</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #messages { height: 70vh; overflow-y: scroll; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; background: #f9f9f9; }
    .message { margin: 12px 0; padding: 10px; border-radius: 8px; }
    .visitor { background: #e3f2fd; }
    .admin { background: #e8f5e9; margin-left: 20%; }
    textarea { width: 100%; padding: 10px; margin: 5px 0; }
    button { padding: 12px 24px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Admin — Support Chat</h1>
  <p><small>Push-Benachrichtigungen sollten funktionieren</small></p>
  
  <div id="messages"></div>
  
  <form id="form">
    <textarea id="reply" rows="3" placeholder="Antwort schreiben..."></textarea><br>
    <button type="submit">Antwort senden</button>
  </form>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD9Tiws2tf1rYJuJ83hMJ6q1owJ2iHbMR8",
      authDomain: "my-simple-chat-b59b9.firebaseapp.com",
      databaseURL: "https://my-simple-chat-b59b9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-simple-chat-b59b9",
      storageBucket: "my-simple-chat-b59b9.firebasestorage.app",
      messagingSenderId: "106669535181",
      appId: "1:106669535181:web:678e89c79b063bb03c5e84"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref('messages');
    const messaging = firebase.messaging();

    const messagesDiv = document.getElementById('messages');
    const form = document.getElementById('form');

    async function requestPermission() {
      try {
        await Notification.requestPermission();
      } catch (e) {}
    }
    requestPermission();

    messagesRef.orderByChild('timestamp').on('child_added', (snapshot) => {
      const msg = snapshot.val();
      const div = document.createElement('div');
      div.className = `message ${msg.sender}`;
      div.innerHTML = `<strong>${msg.sender === 'admin' ? 'Sie (Admin)' : 'Besucher'}:</strong><br>
                       ${msg.text}<br>
                       <small>${new Date(msg.timestamp).toLocaleString('de-DE')}</small>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      if (msg.sender === 'visitor') {
        new Notification("Neue Nachricht vom Besucher!", {
          body: msg.text.substring(0, 120),
        });
        new Audio('https://freesound.org/data/previews/387/387186_7258990-lq.mp3').play().catch(() => {});
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = document.getElementById('reply').value.trim();
      if (!text) return;

      messagesRef.push({
        sender: 'admin',
        text: text,
        timestamp: Date.now()
      });

      document.getElementById('reply').value = '';
    });
  </script>
</body>
</html>
