<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Чат</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #messages { height: 70vh; overflow-y: scroll; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; background: #f9f9f9; }
    .message { margin: 12px 0; padding: 10px; border-radius: 8px; }
    .visitor { background: #e3f2fd; }
    .admin { background: #e8f5e9; margin-left: 20%; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; }
    button { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Админ-панель чата</h1>
  <p><small>Открывайте эту страницу на телефоне и компьютере</small></p>
  
  <div id="messages"></div>
  
  <form id="form">
    <textarea id="reply" rows="3" placeholder="Напишите ответ..."></textarea><br>
    <button type="submit">Отправить ответ</button>
  </form>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD9Tiws2tf1rYJuJ83hMJ6q1owJ2iHbMR8",
      authDomain: "my-simple-chat-b59b9.firebaseapp.com",
      databaseURL: "https://my-simple-chat-b59b9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-simple-chat-b59b9",
      storageBucket: "my-simple-chat-b59b9.firebasestorage.app",
      messagingSenderId: "106669535181",
      appId: "1:106669535181:web:678e89c79b063bb03c5e84"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref('messages');

    const messagesDiv = document.getElementById('messages');
    const form = document.getElementById('form');

    // Запрос разрешения на уведомления
    if (Notification.permission === "default") {
      Notification.requestPermission();
    }

    // Отображение сообщений
    messagesRef.orderByChild('timestamp').on('child_added', (snapshot) => {
      const msg = snapshot.val();
      const div = document.createElement('div');
      div.className = `message ${msg.sender}`;
      div.innerHTML = `<strong>${msg.sender === 'admin' ? 'Вы (админ)' : 'Посетитель'}:</strong><br>
                       ${msg.text}<br>
                       <small>${new Date(msg.timestamp).toLocaleString('ru-RU')}</small>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // Уведомление при новом сообщении от посетителя
      if (msg.sender === 'visitor') {
        if (Notification.permission === "granted") {
          new Notification("Новое сообщение от посетителя!", {
            body: msg.text.substring(0, 100),
            icon: "" // можно добавить иконку позже
          });
        }
        // Звуковой сигнал
        new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3').play().catch(()=>{});
      }
    });

    // Отправка ответа от админа
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = document.getElementById('reply').value.trim();
      if (!text) return;

      messagesRef.push({
        sender: 'admin',
        text: text,
        timestamp: Date.now()
      });

      document.getElementById('reply').value = '';
    });
  </script>
</body>
</html>
