<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Support Chat</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      display: flex; 
      flex-direction: column;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
      flex-shrink: 0;
    }
    #messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 15px; 
      background: #f9f9f9;
    }
    .message { 
      margin: 12px 0; 
      padding: 12px; 
      border-radius: 10px; 
      max-width: 85%;
    }
    .visitor { background: #e3f2fd; }
    .admin { background: #e8f5e9; margin-left: auto; }
    .input-area {
      padding: 12px;
      background: white;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    textarea { 
      width: 100%; 
      height: 70px; 
      padding: 10px; 
      border: 1px solid #ccc; 
      border-radius: 8px;
      font-size: 16px;
    }
    button { 
      margin-top: 8px;
      width: 100%; 
      padding: 16px; 
      font-size: 17px; 
      background: #0066ff; 
      color: white; 
      border: none; 
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h2>Admin — Support Chat</h2>
  </header>
  
  <div id="messages"></div>
  
  <div class="input-area">
    <form id="form">
      <textarea id="reply" placeholder="Antwort schreiben..."></textarea>
      <button type="submit">Antwort senden</button>
    </form>
  </div>

  <script>
    // === Firebase Config ===
    const firebaseConfig = {
      apiKey: "AIzaSyD9Tiws2tf1rYJuJ83hMJ6q1owJ2iHbMR8",
      authDomain: "my-simple-chat-b59b9.firebaseapp.com",
      databaseURL: "https://my-simple-chat-b59b9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-simple-chat-b59b9",
      storageBucket: "my-simple-chat-b59b9.firebasestorage.app",
      messagingSenderId: "106669535181",
      appId: "1:106669535181:web:678e89c79b063bb03c5e84"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref('messages');

    // DOM элементы
    const messagesDiv = document.getElementById('messages');
    const form = document.getElementById('form');
    const replyInput = document.getElementById('reply');

    // Уведомления
    if (Notification.permission === "default") {
      Notification.requestPermission();
    }

    // Получение сообщений
    messagesRef.orderByChild('timestamp').on('child_added', (snapshot) => {
      const msg = snapshot.val();
      if (!msg || !msg.text) return;

      const div = document.createElement('div');
      div.className = `message ${msg.sender}`;
      div.innerHTML = `<strong>${msg.sender === 'admin' ? 'Sie (Admin)' : 'Besucher'}:</strong><br>
                       ${msg.text}<br>
                       <small>${new Date(msg.timestamp).toLocaleString('de-DE')}</small>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      if (msg.sender === 'visitor') {
        if (Notification.permission === "granted") {
          new Notification("Neue Nachricht vom Besucher!", {
            body: msg.text.substring(0, 100)
          });
        }
        new Audio('https://freesound.org/data/previews/387/387186_7258990-lq.mp3').play().catch(() => {});
      }
    });

    // Отправка сообщения
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = replyInput.value.trim();
      if (!text) return;

      messagesRef.push({
        sender: 'admin',
        text: text,
        timestamp: Date.now()
      });

      replyInput.value = '';
    });
  </script>
</body>
</html>
