<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin — Support Chat</title>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    header {
      background: #333;
      color: #fff;
      padding: 12px 14px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    header h2 {
      font-size: 18px;
      margin: 0;
    }
    #enableNotif {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #ffb300;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }
    #status {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 6px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #f9f9f9;
      -webkit-overflow-scrolling: touch;
    }
    .message {
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      max-width: 90%;
      word-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.35;
    }
    .visitor {
      background: #e3f2fd;
      margin-right: auto;
    }
    .admin {
      background: #e8f5e9;
      margin-left: auto;
    }
    .meta {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
    .input-area {
      padding: 12px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    button.send {
      margin-top: 10px;
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button.send:disabled {
      background: #8fb3ff;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <div class="row">
      <h2>Admin — Support Chat</h2>
      <button id="enableNotif" type="button">Notifications aktivieren</button>
    </div>
    <div id="status">Warten auf Nachrichten…</div>
  </header>

  <div id="messages"></div>

  <div class="input-area">
    <form id="form">
      <textarea id="reply" placeholder="Antwort schreiben..."></textarea>
      <button class="send" type="submit" id="sendBtn">Antwort senden</button>
    </form>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD9Tiws2tf1rYJuJ83hMJ6q1owJ2iHbMR8",
      authDomain: "my-simple-chat-b59b9.firebaseapp.com",
      databaseURL: "https://my-simple-chat-b59b9-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-simple-chat-b59b9",
      storageBucket: "my-simple-chat-b59b9.firebasestorage.app",
      messagingSenderId: "106669535181",
      appId: "1:106669535181:web:678e89c79b063bb03c5e84"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.database();
    const messagesRef = db.ref('messages');
    const query = messagesRef.orderByChild('timestamp').limitToLast(200);

    const messagesDiv = document.getElementById('messages');
    const form = document.getElementById('form');
    const replyInput = document.getElementById('reply');
    const sendBtn = document.getElementById('sendBtn');
    const enableNotifBtn = document.getElementById('enableNotif');
    const statusEl = document.getElementById('status');

    const renderedKeys = new Set();
    let notificationsAllowed = false;

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = `message ${msg.sender === 'admin' ? 'admin' : 'visitor'}`;

      const title = document.createElement('strong');
      title.textContent = msg.sender === 'admin' ? 'Sie (Admin)' : 'Besucher';

      const text = document.createElement('div');
      text.textContent = msg.text || '';

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = new Date(msg.timestamp || Date.now()).toLocaleString('de-DE');

      div.appendChild(title);
      div.appendChild(document.createElement('br'));
      div.appendChild(text);
      div.appendChild(meta);

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function notifyNewVisitorMessage(msg) {
      if (msg.sender !== 'visitor') return;
      if (!notificationsAllowed) return;
      if (!('Notification' in window)) return;

      // Уведомляем только если вкладка не активна
      if (!document.hidden && document.hasFocus()) return;

      try {
        const title = 'Neue Nachricht vom Besucher';
        const body = (msg.text || '').slice(0, 120);

        const n = new Notification(title, {
          body,
          icon: undefined
        });

        setTimeout(() => n.close(), 5000);
      } catch (err) {
        console.error('Notification error:', err);
      }
    }

    function onMessage(snapshot, isLive = false) {
      if (renderedKeys.has(snapshot.key)) return;
      renderedKeys.add(snapshot.key);

      const msg = snapshot.val();
      if (!msg || !msg.text) return;

      renderMessage(msg);

      if (isLive) {
        notifyNewVisitorMessage(msg);
      }
    }

    // Первичная загрузка, затем live-слушатель
    query.once('value').then((snapshot) => {
      snapshot.forEach((child) => onMessage(child, false));
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      query.on('child_added', (snap) => {
        onMessage(snap, true);
      });
    });

    enableNotifBtn.addEventListener('click', async () => {
      if (!('Notification' in window)) {
        statusEl.textContent = 'Dieser Browser unterstützt keine Benachrichtigungen.';
        return;
      }

      try {
        const perm = await Notification.requestPermission();
        if (perm === 'granted') {
          notificationsAllowed = true;
          statusEl.textContent = 'Benachrichtigungen aktiviert.';
          enableNotifBtn.textContent = 'Benachrichtigungen aktiv';
          enableNotifBtn.disabled = true;
        } else {
          statusEl.textContent = 'Benachrichtigungen wurden abgelehnt.';
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Fehler beim Aktivieren der Benachrichtigungen.';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const text = replyInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;

      try {
        await messagesRef.push({
          sender: 'admin',
          text,
          timestamp: Date.now()
        });

        replyInput.value = '';
        replyInput.focus();
      } catch (err) {
        alert('Fehler beim Senden der Antwort.');
        console.error(err);
      } finally {
        sendBtn.disabled = false;
      }
    });

    // Подсказка по разрешению уведомлений
    if ('Notification' in window && Notification.permission === 'granted') {
      notificationsAllowed = true;
      enableNotifBtn.textContent = 'Benachrichtigungen aktiv';
      enableNotifBtn.disabled = true;
      statusEl.textContent = 'Benachrichtigungen sind bereits aktiviert.';
    } else if ('Notification' in window && Notification.permission === 'denied') {
      statusEl.textContent = 'Benachrichtigungen sind im Browser blockiert.';
    } else {
      statusEl.textContent = 'Benachrichtigungen können über кнопку aktiviert werden.';
    }
  </script>
</body>
</html>
