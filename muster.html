<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentenvergleich</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #e9e9e9;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: white;
            padding: 12px 0;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 22px;
            color: #1a1a1a;
        }
        .main {
            display: flex;
            height: calc(100vh - 52px);
            gap: 8px;
            padding: 8px;
        }
        .panel {
            flex: 1;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 10px 12px;
            background: #f1f3f5;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }
        .content {
            flex: 1;
            overflow: auto;
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }
        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ergebnisse der Verarbeitung des gescannten Dokuments</h1>
    </header>

    <div class="main">
        <!-- Оригинал -->
        <div class="panel">
            <div class="panel-header">Original-Scan (JPG)</div>
            <div class="content">
                <img src="original-scan.jpg" alt="Original">
            </div>
        </div>

        <!-- Обработанный документ -->
        <div class="panel">
            <div class="panel-header">Verarbeitetes Dokument (JPG)</div>
            <div class="content">
                <img src="verarbeitetes-dokument.jpg" alt="Verarbeitet">
            </div>
        </div>
    </div>

</body>
</html>
