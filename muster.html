<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan-Verarbeitung | Vergleich</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f9fa;
        }

        header {
            background: white;
            padding: 20px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        header h1 {
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 85px);
        }

        .panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 14px 20px;
            background: #f1f3f5;
            font-weight: 600;
            color: #222;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
        }

        .content {
            flex: 1;
            padding: 15px;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        img, iframe {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
            background: white;
        }

        iframe {
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ergebnisse der Verarbeitung des gescannten Dokuments</h1>
    </header>

    <div class="container">
        <!-- Linke Seite - JPG Original -->
        <div class="panel">
            <div class="panel-header">Original-Scan (JPG)</div>
            <div class="content">
                <img id="jpgImage" src="original-scan.jpg" alt="Original Scan">
            </div>
        </div>

        <!-- Rechte Seite - PDF -->
        <div class="panel">
            <div class="panel-header">Verarbeitetes Dokument (PDF)</div>
            <div class="content">
                <iframe id="pdfFrame" src="verarbeitetes-dokument.pdf" 
                        width="100%" height="100%"></iframe>
            </div>
        </div>
    </div>

</body>
</html>
