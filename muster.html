<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan-Verarbeitung | Vergleich</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f4;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: white;
            padding: 18px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            color: #1a1a1a;
        }

        .container {
            display: flex;
            gap: 16px;
            padding: 16px;
            height: calc(100vh - 78px);
        }

        .panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 12px 20px;
            background: #f1f3f5;
            font-weight: 600;
            color: #222;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .content {
            flex: 1;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: auto;
        }

        /* JPG */
        #jpgImage {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: white;
        }

        /* PDF */
        #pdfFrame {
            width: 100%;
            height: 100%;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ergebnisse der Verarbeitung des gescannten Dokuments</h1>
    </header>

    <div class="container">
        <!-- Левая панель — JPG -->
        <div class="panel">
            <div class="panel-header">Original-Scan (JPG)</div>
            <div class="content">
                <img id="jpgImage" src="original-scan.jpg" alt="Original Scan">
            </div>
        </div>

        <!-- Правая панель — PDF -->
        <div class="panel">
            <div class="panel-header">Verarbeitetes Dokument (PDF)</div>
            <div class="content">
                <iframe id="pdfFrame" 
                        src="verarbeitetes-dokument.pdf#toolbar=0&navpanes=0&scrollbar=0" 
                        type="application/pdf">
                </iframe>
            </div>
        </div>
    </div>

</body>
</html>
