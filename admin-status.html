<script>
  const CHAT_API = "https://rustranspro-github-io.vercel.app/api/chat";

  async function loadMessages() {
    try {
      const res = await fetch(CHAT_API + "?t=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      const messages = await res.json();
      
      const box = document.getElementById("messages");
      box.innerHTML = messages.map(m => `
        <div style="margin-bottom:15px; padding:14px; border-radius:12px; background:${m.author === 'admin' ? '#e6f7e6' : '#f5f5f5'};">
          <div style="font-weight:bold; margin-bottom:6px; color:${m.author === 'admin' ? '#28a745' : '#444'}">
            ${m.author === 'admin' ? 'Вы (Admin)' : 'Посетитель'}
          </div>
          <div>${m.text}</div>
        </div>
      `).join("");
      
      box.scrollTop = box.scrollHeight;
    } catch (e) {
      console.error(e);
    }
  }

  async function sendMessage() {
    const textarea = document.getElementById("msg");
    const text = textarea.value.trim();
    if (!text) return;

    try {
      await fetch(CHAT_API + "?t=" + Date.now(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ author: "admin", text })
      });
      textarea.value = "";
      loadMessages();
    } catch (e) {
      alert("Не удалось отправить. Проверьте CORS на сервере Vercel.");
      console.error(e);
    }
  }

  loadMessages();
  setInterval(() => {
    if (document.visibilityState === "visible") loadMessages();
  }, 8000);

  window.sendMessage = sendMessage;
</script>
