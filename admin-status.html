<script>
  const CHAT_API = "https://rustranspro-github-io.vercel.app/api/chat";

  async function loadMessages() {
    try {
      const res = await fetch(CHAT_API + "?t=" + Date.now(), {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors'
      });
      const messages = await res.json();
      
      const box = document.getElementById("messages");
      box.innerHTML = messages.map(m => `
        <div style="margin-bottom:15px; padding:14px; border-radius:12px; background:${m.author === 'admin' ? '#e6f7e6' : '#f5f5f5'}; line-height:1.5; font-size:15px; word-break:break-word;">
          <div style="font-weight:bold; margin-bottom:6px; color:${m.author === 'admin' ? '#28a745' : '#444'}">
            ${m.author === 'admin' ? 'Вы (Admin)' : 'Посетитель'}
          </div>
          <div>${m.text}</div>
        </div>
      `).join("");

      box.scrollTop = box.scrollHeight;
    } catch (e) {
      console.error(e);
      document.getElementById("messages").innerHTML = `<div style="color:red; padding:10px;">Ошибка загрузки чата: ${e.message}</div>`;
    }
  }

  async function sendMessage() {
    const textarea = document.getElementById("msg");
    const text = textarea.value.trim();
    if (!text) return;

    try {
      const res = await fetch(CHAT_API + "?t=" + Date.now(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ author: "admin", text }),
        mode: 'cors'
      });

      if (!res.ok) throw new Error("Server error");

      textarea.value = "";
      loadMessages();
    } catch (e) {
      console.error(e);
      alert("Ошибка отправки:\n" + e.message + "\n\nВозможно, проблема с CORS на сервере.");
    }
  }

  // Запуск
  loadMessages();
  setInterval(() => {
    if (document.visibilityState === "visible") loadMessages();
  }, 10000);

  window.sendMessage = sendMessage;
</script>
